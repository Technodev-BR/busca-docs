name: Deploy docs (VitePress) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma publicacao por vez; nao cancela deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Renderiza os .drawio (fonte, em docs/public/diagramas) em SVG.
      - name: Renderizar diagramas (.drawio -> SVG)
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs/public/diagramas
          format: svg
          output: export

      # Move os SVGs renderizados para docs/public/diagramas (servidos como /diagramas/*).
      # A drawio-export-action roda num container Docker como root, entao a pasta export/
      # e os SVGs saem com dono root. Devolvemos a posse ao usuario do runner antes de
      # copiar/remover, senao o rm falha com "permission denied".
      - name: Mover SVGs para docs/public/diagramas
        run: |
          sudo chown -R "$(id -u):$(id -g)" docs/public/diagramas
          cp docs/public/diagramas/export/*.svg docs/public/diagramas/ || true
          rm -rf docs/public/diagramas/export
          echo "Arquivos disponiveis:" && ls -la docs/public/diagramas || true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Build do site
        run: npm run docs:build

      - name: Configurar Pages
        uses: actions/configure-pages@v6

      - name: Publicar artefato
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
